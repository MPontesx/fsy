<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>FSY Equipe</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B3A5C">
<meta name="color-scheme" content="light only">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Equipe FSY">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap');

:root{
  --blue:#4F86BC;
  --ink:#1B3A5C;
  --black:#111111;
  --ink-soft:#4b5c6c;
  --muted:#6B7A88;
  --mist:#8FA0AF;
  --paper:#ffffff;
  --soft:#F5F6F7;
  --soft2:#EAEBED;
  --line:#DDDFE2;
  --gold:#FFC73A;
  --gold-deep:#C99A1E;
  --red:#a3291f;
  --green:#3f6b46;
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;overflow-x:hidden;width:100%;color-scheme:light;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--soft);
  color:var(--black);
  display:flex;
  justify-content:center;
  -webkit-text-size-adjust:100%;
}
#app{
  width:100%;
  max-width:480px;
  min-height:100vh;
  min-height:100dvh;
  background:var(--paper);
  display:flex;
  flex-direction:column;
  position:relative;
}
.display{font-family:'Archivo Black','Inter',sans-serif; letter-spacing:-0.02em;}

/* ---------- Top bar ---------- */
.topbar{
  background:var(--ink);
  color:#fff;
  padding:14px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:30;
}
.brand{display:flex;align-items:center;gap:10px;min-width:0;}
.badge-mark{
  width:34px;height:34px;border-radius:8px;
  background:linear-gradient(155deg,var(--gold),var(--gold-deep));
  display:flex;align-items:center;justify-content:center;
  font-family:'Archivo Black',sans-serif;font-size:12px;color:#1B3A5C;
  flex-shrink:0;
}
.brand-text{display:flex;flex-direction:column;line-height:1.1;min-width:0;}
.brand-text .t1{font-size:15px;font-weight:800;letter-spacing:0.01em;}
.brand-text .t2{font-size:10px;color:var(--mist);letter-spacing:0.08em;text-transform:uppercase;}
.user-chip{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  padding:6px 10px;border-radius:20px;
  font-size:12px;cursor:pointer;
  max-width:140px;flex-shrink:0;
}
.user-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.user-chip span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ---------- Content ---------- */
#content{flex:1;padding:16px 16px 90px 16px;overflow-y:auto;overflow-x:hidden;max-width:100%;}
.section-title{
  font-size:11px;text-transform:uppercase;letter-spacing:0.1em;
  color:var(--muted);font-weight:700;margin:18px 0 8px 2px;
}
.section-title:first-child{margin-top:0;}

/* ---------- Bottom nav ---------- */
.navbar{
  position:sticky;bottom:0;
  display:flex;
  background:var(--ink);
  border-top:1px solid #000;
  z-index:30;
  padding-bottom:env(safe-area-inset-bottom);
}
.navbtn{
  flex:1;padding:10px 4px 12px 4px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  color:rgba(255,255,255,0.55);background:none;border:none;font-family:inherit;
  font-size:10.5px;letter-spacing:0.02em;cursor:pointer;
}
.navbtn.active{color:#fff;}
.navbtn .ic{width:20px;height:20px;}
.navbtn.active .ic svg{stroke:#fff;}
.navbtn .ic svg{width:20px;height:20px;stroke:rgba(255,255,255,0.55);fill:none;stroke-width:1.8;}

/* ---------- Buttons ---------- */
.btn{
  font-family:inherit;border:none;border-radius:10px;
  padding:11px 16px;font-weight:700;font-size:13.5px;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
}
.btn-primary{background:var(--ink);color:#fff;}
.btn-gold{background:var(--gold);color:#1B3A5C;}
.btn-outline{background:transparent;border:1.5px solid var(--ink);color:var(--black);}
.btn-ghost{background:var(--soft2);color:var(--ink-soft);}
.btn-danger{background:#fbeae8;color:var(--red);}
.btn-block{width:100%;}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px;}

/* ---------- Cards ---------- */
.card{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:var(--radius);
  margin-bottom:10px;
  overflow:hidden;
}
.card-pad{padding:14px;}

/* ---------- Day chips ---------- */
.daychips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 10px 2px;-webkit-overflow-scrolling:touch;}
.daychip{
  flex-shrink:0;
  padding:9px 14px;border-radius:10px;
  background:var(--soft2);color:var(--ink-soft);
  font-weight:700;font-size:12.5px;cursor:pointer;
  border:1.5px solid transparent;
  white-space:nowrap;
}
.daychip.active{background:var(--blue);color:var(--black);}

.day-header{
  background:var(--ink);color:#fff;border-radius:var(--radius) var(--radius) 0 0;
  padding:16px;
}
.day-header h2{margin:0;font-size:26px;}
.day-header .dress{
  margin-top:4px;font-size:12px;color:var(--mist);font-style:italic;
}

/* ---------- Activity row ---------- */
.activity{
  border-bottom:1px solid var(--line);
}
.activity:last-child{border-bottom:none;}
.act-head{
  display:flex;align-items:flex-start;gap:10px;
  padding:13px 14px;cursor:pointer;
}
.act-time{
  font-size:11.5px;font-weight:800;color:var(--gold-deep);
  width:64px;flex-shrink:0;padding-top:2px;
}
.act-main{flex:1;min-width:0;}
.act-title{font-size:14px;font-weight:700;line-height:1.3;}
.act-title.done{text-decoration:line-through;color:var(--muted);}
.act-you{font-size:11px;color:var(--muted);margin-top:2px;}
.act-you b{color:var(--ink-soft);}
.check{
  width:22px;height:22px;border-radius:6px;border:2px solid var(--line);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  margin-top:1px;cursor:pointer;
}
.check.checked{background:var(--green);border-color:var(--green);}
.check svg{width:13px;height:13px;stroke:#fff;stroke-width:3;display:none;}
.check.checked svg{display:block;}

.act-detail{padding:0 14px 16px 14px;}
.matrix{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:10px;
}
.matrix-item{
  background:var(--soft);border-radius:7px;padding:5px 7px;font-size:9.5px;min-width:0;
}
.matrix-item .role{font-weight:700;color:var(--ink-soft);display:block;margin-bottom:1px;font-size:8.5px;}
.act-desc{font-size:14.5px;color:var(--black);line-height:1.55;margin-bottom:10px;background:var(--soft);padding:14px 15px;border-radius:11px;border-left:4px solid var(--gold);font-weight:500;}
.act-meta{font-size:10.5px;color:var(--muted);margin-top:6px;}

/* ---------- Needs ---------- */
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch;}
.fchip{
  flex-shrink:0;padding:6px 12px;border-radius:20px;font-size:11.5px;font-weight:700;
  background:var(--soft2);color:var(--ink-soft);cursor:pointer;border:1.5px solid transparent;
  white-space:nowrap;
}
.fchip.active{background:var(--blue);color:var(--black);}

.need-card{padding:14px;cursor:pointer;}
.need-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.need-title{font-weight:700;font-size:14px;min-width:0;}
.tag{
  font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:0.04em;
  padding:3px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0;
}
.tag-aberto{background:#fbeae8;color:var(--red);}
.tag-andamento{background:#FFF3D6;color:var(--gold-deep);}
.tag-concluido{background:#e7f1e8;color:var(--green);}
.prio-urgente{color:var(--red);}
.prio-alta{color:var(--gold-deep);}
.need-desc{font-size:12.5px;color:var(--ink-soft);margin-top:6px;line-height:1.45;}
.need-meta{font-size:10.5px;color:var(--muted);margin-top:8px;display:flex;gap:10px;flex-wrap:wrap;}

.fab{
  position:absolute;right:16px;bottom:84px;z-index:25;
  width:52px;height:52px;border-radius:50%;
  background:var(--gold);color:#1B3A5C;border:none;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 16px rgba(0,0,0,0.25);cursor:pointer;
}
.fab svg{width:24px;height:24px;stroke:#1B3A5C;stroke-width:2.3;fill:none;}

/* ---------- Forms ---------- */
.field{margin-bottom:12px;}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--ink-soft);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:10px 11px;border:1.5px solid var(--line);border-radius:9px;
  font-family:inherit;font-size:16px;background:var(--paper);color:var(--black);
}
.field textarea{resize:vertical;min-height:70px;font-size:14px;}
.seg{display:flex;gap:6px;flex-wrap:wrap;}
.seg-opt{
  padding:7px 12px;border-radius:8px;background:var(--soft2);font-size:12px;font-weight:700;
  color:var(--ink-soft);cursor:pointer;border:1.5px solid transparent;
}
.seg-opt.active{background:var(--blue);color:var(--black);}

/* ---------- Modal / sheet ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(20,18,12,0.55);
  display:flex;align-items:flex-end;justify-content:center;z-index:100;
}
.overlay.center{align-items:center;padding:20px;}
.sheet{
  width:100%;max-width:480px;background:var(--paper);
  border-radius:18px 18px 0 0;max-height:88vh;max-height:88dvh;overflow-y:auto;
  animation:up .18s ease-out;
}
.overlay.center .sheet{border-radius:16px;max-height:85vh;max-height:85dvh;}
@keyframes up{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 10px 16px;position:sticky;top:0;background:var(--paper);
}
.sheet-head h3{margin:0;font-size:17px;padding-right:8px;}
.sheet-body{padding:0 16px 22px 16px;}
.x{
  width:30px;height:30px;border-radius:50%;background:var(--soft2);border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
}
.x svg{width:14px;height:14px;stroke:var(--ink-soft);stroke-width:2.4;}

.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty .ic{font-size:34px;margin-bottom:8px;}
.empty .t{font-weight:700;color:var(--ink-soft);font-size:14px;margin-bottom:4px;}
.empty .s{font-size:12px;}

.roster-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line);gap:8px;}
.roster-row:last-child{border-bottom:none;}
.roster-name{font-weight:700;font-size:13.5px;}
.roster-role{font-size:11px;color:var(--muted);margin-top:1px;}
.lvl-pill{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
.lvl-admin{background:#FFF0C2;color:var(--gold-deep);}
.lvl-coordenacao{background:#e2e8e3;color:var(--green);}
.lvl-logistica{background:#DCEBF8;color:var(--black);}
.lvl-consultor{background:var(--soft2);color:var(--ink-soft);}

.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;padding:10px 18px;border-radius:30px;
  font-size:12.5px;font-weight:600;z-index:200;opacity:0;transition:opacity .25s;
  pointer-events:none;max-width:90vw;text-align:center;
}
.toast.show{opacity:1;}

.pick-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 14px;border-bottom:1px solid var(--line);cursor:pointer;
}
.pick-row:active{background:var(--soft);}
.helptext{font-size:11.5px;color:var(--muted);margin:-4px 0 14px 2px;line-height:1.5;}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script type="module">
/* ============================================================
   FSY EQUIPE — app de coordenação de staff para acampamento
   Dados compartilhados via Firebase Firestore (tempo real)
   ============================================================ */

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnKe8i0aXn9ZresRun2LfqRay4TEG4szU",
  authDomain: "fsy-2027-recnorte.firebaseapp.com",
  projectId: "fsy-2027-recnorte",
  storageBucket: "fsy-2027-recnorte.firebasestorage.app",
  messagingSenderId: "216443030905",
  appId: "1:216443030905:web:0e08e5e6514b5a6fae33a8"
};
const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);

// Um documento por "gaveta" de dados, todos dentro da coleção 'fsyEquipe'.
const rosterRef   = doc(db, 'fsyEquipe', 'roster');
const needsRef    = doc(db, 'fsyEquipe', 'needs');
const scheduleRef = doc(db, 'fsyEquipe', 'schedule');

const ACCESS = {
  admin:        {label:'Administrador', rank:3},
  coordenacao:  {label:'Coordenação',    rank:2},
  logistica:    {label:'Logística',      rank:2},
  consultor:    {label:'Consultor',      rank:1}
};
// Adicionado 'Logística' como uma função de equipe (roster), igual às demais.
const MANUAL_ROLES = ['Consultor','Coordenador Assistente','Coordenador','Casal Diretor da Sessão','Logística'];

// Para quem uma necessidade pode ser encaminhada.
const ASSIGN_TARGETS = ['Casal Diretor','Coordenador Assistente','Logística'];
// Categorias de necessidade — 'Relato do Dia' é a nova categoria de feedback/observações.
const NEED_CATEGORIES = ['Material','Problema','Relato do Dia','Outro'];

let state = {
  user:null,           // {id,name,manualRole,access}
  roster:{users:[]},
  needs:[],
  schedule:null,
  tab:'cronograma',
  day:0,
  needFilter:'todos',
  needCatFilter:'todos',
  loaded:false
};

const $ = sel => document.querySelector(sel);
const el = (tag, cls, html) => { const e=document.createElement(tag); if(cls) e.className=cls; if(html!==undefined) e.innerHTML=html; return e; };
const uid = () => Math.random().toString(36).slice(2,10);
const esc = s => (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(window._tt); window._tt = setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ---------------- Default schedule (from Manual da Equipe FSY 2027, pgs 5-10) ---------------- */
function defaultSchedule(){
  const R = (c,ca,co,cd) => ({consultor:c, coordAssist:ca, coordenador:co, casalDiretor:cd});
  return { days: [
    { id:'d0', name:'Dia Zero', sub:'Dia antes do início da conferência', dress:'Roupa casual', activities:[
      {time:'A definir', title:'Visita às instalações/locais', roles:R('Participar','Participar','Liderar','Participar, se desejar'), desc:'Familiarize-se com o local e as instalações para saber direcionar os participantes. Inclui áreas reservadas, alojamentos, refeitório, campos e áreas de tempo livre.'},
      {time:'A definir', title:'Orientação para os consultores', roles:R('Participar','—','Dirigir','—'), desc:'Saiba mais sobre seu papel e responsabilidades como consultor na conferência FSY. Chegue no horário e faça anotações.'},
      {time:'19h–20h', title:'Mensagem do casal diretor da sessão', roles:R('Participar','Participar','Dirigir','Ensinar'), desc:'Reunião obrigatória para toda a equipe. Recebimento de aperfeiçoamento espiritual em preparação para a sessão. Não se atrase e faça anotações.'},
      {time:'20h15–21h15', title:'Reuniões CA e consultores / Consultor e adjunto', roles:R('Participar','Participar','Participar','Participar'), desc:'Grupo de debate de coordenadores assistentes e consultores: fortaleça o relacionamento com sua equipe, defina expectativas e metas da semana. Planejamento e entrevistas com o(s) consultor(es) adjunto(s): apresentem-se, troquem contatos, definam local de encontro da companhia e combinem estilos de ensino.'},
      {time:'21h20–21h50', title:'Reunião dupla de Coordenadores e Coordenadores Assistentes', roles:R('—','Participar','Dirigir','—'), desc:''}
    ]},
    { id:'d1', name:'1º Dia', sub:'Chegada e início da sessão', dress:'Camiseta da Equipe FSY', activities:[
      {time:'7h30–8h20', title:'Desjejum da equipe', roles:R('Participar','Participar','Participar','Participar')},
      {time:'8h–8h20', title:'Reunião de coordenadores/coordenadores assistentes', roles:R('—','Participar','Dirigir','—')},
      {time:'8h30–9h15', title:'Reunião administrativa', roles:R('Participar','Participar','Dirigir','Compartilhar mensagem de 5 min')},
      {time:'9h15–10h', title:'Planejamento do consultor adjunto', roles:R('Dirigir','—','—','—')},
      {time:'9h15–10h45', title:'Distribuição de materiais e ensaio da orientação', roles:R('Auxiliar','Dirigir, se designado','Supervisionar','Participar, se desejar')},
      {time:'11h–13h', title:'Check-in', roles:R('Auxiliar','Dirigir, se designado','Supervisionar','Participar')},
      {time:'13h15–14h', title:'Conheça seu consultor', roles:R('Dirigir','Participar, se desejar','—','Participar, se desejar'), desc:'Primeira vez que você se encontra com seus jovens. Você terá cerca de 1 hora para: (1) demonstrar amor e animação; (2) usar um jogo de apresentação para todos aprenderem os nomes; (3) convidar o Espírito com uma escritura e testemunho; (4) explicar as normas e o vestuário esperado; (5) perguntar como você pode ajudá-los a terem uma ótima semana. Aproveite também para dividir os jovens em 4 equipes para a atividade "O Cristo Vivo" do dia 4.'},
      {time:'14h15–15h25', title:'Conheça sua companhia', roles:R('Dirigir','Participar, se desejar','—','Participar, se desejar'), desc:'Reúna-se com toda a companhia. Use jogos de apresentação, depois oriente a escolha do nome da companhia com base na escritura designada e conduza a elaboração de metas pessoais e da companhia para a semana.'},
      {time:'15h40–16h25', title:'Orientação', roles:R('Participar','Auxiliar','Dirigir','Auxiliar')},
      {time:'16h30–16h50', title:'Tempo livre', roles:R('Participar','Participar','Dirigir','Participar, se desejar')},
      {time:'17h–17h50', title:'Brincadeiras da noite familiar', roles:R('Dirigir','Participar','Participar','Participar, se desejar')},
      {time:'18h–18h50', title:'Aula da noite familiar', roles:R('Participar','Participar','Dirigir','Ensinar')},
      {time:'19h–20h30', title:'Jantar', roles:R('Participar','Supervisionar, se designado','Participar','Participar')},
      {time:'20h45–21h15', title:'Refletir e analisar', roles:R('Dirigir','Participar, se desejar','Participar, se desejar','Participar, se desejar')},
      {time:'21h15–22h', title:'Contagem dos participantes, hora do silêncio etc.', roles:R('Dirigir','Receber','Receber','—')},
      {time:'22h10', title:'Apagar as luzes', roles:R('Supervisionar','Auxiliar','Auxiliar','—')},
      {time:'22h20–22h50', title:'Reunião de coordenadores/coordenadores assistentes', roles:R('Supervisionar','Auxiliar','Auxiliar','Participar, se desejar')},
      {time:'23h', title:'Staff se recolher', roles:R('—','Supervisionar','Supervisionar','Supervisionar')}
    ]},
    { id:'d2', name:'2º Dia', sub:'', dress:'Roupa de domingo', activities:[
      {time:'7h45–8h', title:'Reunião de coordenadores assistentes/consultores', roles:R('Participar','Dirigir','—','—')},
      {time:'8h–8h15', title:'Devocional matutino dos participantes', roles:R('Dirigir','Participar, se desejar','—','—')},
      {time:'8h15–9h15', title:'Desjejum', roles:R('Participar','Supervisionar, se designado','Participar','Participar')},
      {time:'9h30–10h30', title:'Reunião Sacramental', roles:R('Participar','Supervisionar','Dirigir','Supervisionar')},
      {time:'10h40–11h35', title:'Escola dominical "Vem, e segue-Me"', roles:R('Ensinar','Participar','Participar','Participar')},
      {time:'11h45–12h45', title:'Tempo disponibilizado para o family search', roles:R('Participar','Supervisionar, se designado','Supervisionar','Ensinar')},
      {time:'13h–14h30', title:'Almoço/ensaio do programa musical', roles:R('Participar','Supervisionar, se designado','Participar','Participar')},
      {time:'14h30–15h30', title:'Compartilhar o Evangelho', roles:R('Participar','Participar','Participar, se desejar','Participar, se desejar')},

/* ---------------- Storage ---------------- */
async function loadAll(){
  try{
    const snap = await getDoc(rosterRef);
    state.roster = snap.exists() ? snap.data() : {users:[]};
  }catch(e){ state.roster = {users:[]}; }

  try{
    const snap = await getDoc(needsRef);
    state.needs = snap.exists() ? (snap.data().items || []) : [];
  }catch(e){ state.needs = []; }

  try{
    const snap = await getDoc(scheduleRef);
    if(snap.exists()){
      state.schedule = snap.data();
    } else {
      state.schedule = defaultSchedule();
      await setDoc(scheduleRef, state.schedule);
    }
  }catch(e){ state.schedule = defaultSchedule(); }

  state.loaded = true;
}
async function saveRoster(){ try{ await setDoc(rosterRef, state.roster); }catch(e){ toast('Erro ao salvar. Tente novamente.'); } }
async function saveNeeds(){ try{ await setDoc(needsRef, {items: state.needs}); }catch(e){ toast('Erro ao salvar. Tente novamente.'); } }
async function saveSchedule(){ try{ await setDoc(scheduleRef, state.schedule); }catch(e){ toast('Erro ao salvar. Tente novamente.'); } }

/* Escuta em tempo real: qualquer alteração de qualquer aparelho chega aqui sozinha,
   sem precisar de setInterval ficando martelando o servidor. */
function startRealtimeSync(){
  onSnapshot(rosterRef, snap=>{
    if(snap.exists()){ state.roster = snap.data(); render(); }
  }, err=>console.warn('sync roster:', err));
  onSnapshot(needsRef, snap=>{
    if(snap.exists()){ state.needs = snap.data().items || []; render(); }
  }, err=>console.warn('sync needs:', err));
  onSnapshot(scheduleRef, snap=>{
    if(snap.exists()){ state.schedule = snap.data(); render(); }
  }, err=>console.warn('sync schedule:', err));
}

/* ---------------- Identity ---------------- */
function myAccessRank(){ return state.user ? ACCESS[state.user.access].rank : 0; }
function canManage(){ return myAccessRank() >= 2; } // coordenacao, logistica ou admin
function isAdmin(){ return myAccessRank() >= 3; }
// Chamados só aparecem pra quem tem acesso de Coordenação, Logística ou Admin
// (Casal Diretor entra como Admin). Consultor não vê a lista — só acompanha
// os chamados que ele mesmo registrou.
function canSeeNeed(n){
  if(myAccessRank() >= 2) return true;
  return n.createdBy === state.user.id;
}
function canManageNeed(n){
  if(isAdmin()) return true;
  if(n.assignedTo==='Logística') return state.user.access==='logistica';
  return canManage();
}

      state.roster.users.push(u);
      await saveRoster();

function selectIdentity(u){
  if(u.pin){
    const body = el('div');
    body.innerHTML = `<div class="field"><label>PIN de acesso</label><input autocomplete="one-time-code" id="pinInput" type="password" inputmode="numeric" maxlength="5" placeholder="00000"></div><button class="btn btn-gold btn-block" id="pinBtn">Entrar</button>`;
    openSheet('Confirme seu PIN', body, true);
    $('#pinBtn').onclick = async ()=>{
      if($('#pinInput').value.trim() === u.pin){ closeSheet(); state.user = u; await rememberIdentity(u); render(); toast('Bem-vindo(a), '+u.name.split(' ')[0]+'!'); }
      else toast('PIN incorreto');
    };
  } else {
    closeSheet(); state.user = u; rememberIdentity(u); render(); toast('Bem-vindo(a), '+u.name.split(' ')[0]+'!');
  }
}

/* ---------------- Lembrar identidade neste aparelho (storage local do navegador) ----------------
   Isso é só do aparelho, não vai pro Firestore — por isso usamos localStorage.
   Cada pessoa que abre o app no seu celular guarda só o próprio ID aqui. */
async function rememberIdentity(u){
  try{ localStorage.setItem('fsyMyIdentity', JSON.stringify({id:u.id})); }catch(e){ /* sem problema se falhar */ }
}
async function forgetIdentity(){
  try{ localStorage.removeItem('fsyMyIdentity'); }catch(e){ /* já não existia */ }
}
async function tryAutoLogin(){
  try{
    const saved = localStorage.getItem('fsyMyIdentity');
    if(!saved) return false;
    const { id } = JSON.parse(saved);
    const u = state.roster.users.find(x=>x.id===id);
    if(u){ state.user = u; return true; }
  }catch(e){ /* nada salvo ainda, ou erro de leitura — segue pro login normal */ }
  return false;
}

  const body = el('div','sheet-body');
  body.appendChild(bodyNode);

}

/* ---------------- Cronograma ---------------- */
function youAction(roles){
  if(!state.user) return null;
  const map = {'Consultor':'consultor','Coordenador Assistente':'coordAssist','Coordenador':'coordenador','Casal Diretor da Sessão':'casalDiretor'};
  const key = map[state.user.manualRole];
  return key ? roles[key] : null;
}

function renderCronograma(){
  const wrap = el('div');
  wrap.appendChild(el('div','section-title','Programação da sessão'));

  const chips = el('div','daychips');
  state.schedule.days.forEach((d,i)=>{
    const c = el('div','daychip'+(state.day===i?' active':''), d.name);
    c.onclick = ()=>{ state.day = i; render(); };
    chips.appendChild(c);
  });
  wrap.appendChild(chips);

  const day = state.schedule.days[state.day];
  const card = el('div','card');
  const head = el('div','day-header');
  head.innerHTML = `<h2 class="display">${esc(day.name)}</h2>${day.sub?`<div class="dress">${esc(day.sub)}</div>`:''}<div class="dress">${esc(day.dress)}</div>`;
  card.appendChild(head);

  day.activities.forEach((a,idx)=>{
    const act = el('div','activity');
    const youAct = youAction(a.roles);
    const doneUsers = a.doneUsers || [];
    const doneByMe = doneUsers.includes(state.user.id);
    const head2 = el('div','act-head');
    head2.innerHTML = `
      <div class="act-time">${esc(a.time)}</div>
      <div class="act-main">
        <div class="act-title${doneByMe?' done':''}">${esc(a.title)}</div>
        ${youAct ? `<div class="act-you">Você: <b>${esc(youAct)}</b></div>` : ''}
      </div>
      <div class="check${doneByMe?' checked':''}">${ICONS.check}</div>
    `;
    const checkEl = head2.querySelector('.check');
    checkEl.onclick = (e)=>{ e.stopPropagation(); toggleDone(state.day, idx); };
    head2.onclick = ()=>{ detail.style.display = detail.style.display==='none' ? 'block' : 'none'; };

    const detail = el('div','act-detail');
    detail.style.display = 'none';
    const doneNames = doneUsers.map(id=>{ const u = state.roster.users.find(x=>x.id===id); return u ? u.name.split(' ')[0] : null; }).filter(Boolean);
    detail.innerHTML = `
      ${a.desc ? `<div class="act-desc">${esc(a.desc)}</div>` : ''}
      <div class="matrix">
        <div class="matrix-item"><span class="role">Pág. do Manual</span>${esc((a.info&&a.info.pagManual)||'—')}</div>
        <div class="matrix-item"><span class="role">Pág. Manual Jovem</span>${esc((a.info&&a.info.pagManualJovem)||'—')}</div>
        <div class="matrix-item"><span class="role">Quem participa</span>${esc((a.info&&a.info.quemParticipa)||'—')}</div>
      </div>
      ${doneNames.length ? `<div class="act-meta">Concluído por ${esc(doneNames.join(', '))}</div>` : ''}
    `;
    // Somente o administrador pode editar o resumo/descrição da atividade.
    if(isAdmin()){
      const editBtn = el('button','btn btn-ghost btn-sm','Editar atividade');
      editBtn.style.marginTop = '4px';
      editBtn.onclick = (e)=>{ e.stopPropagation(); openEditActivity(state.day, idx); };
      detail.appendChild(editBtn);
    }
    act.appendChild(head2); act.appendChild(detail);
    card.appendChild(act);
  });

  if(isAdmin()){
    const addRow = el('div','card-pad');
    const addBtn = el('button','btn btn-outline btn-block','+ Adicionar atividade neste dia');
    addBtn.onclick = ()=> openEditActivity(state.day, null);
    addRow.appendChild(addBtn);
    card.appendChild(addRow);
  }

  wrap.appendChild(card);
  return wrap;
}

async function toggleDone(dayIdx, actIdx){
  const a = state.schedule.days[dayIdx].activities[actIdx];
  if(!a.doneUsers) a.doneUsers = [];
  const i = a.doneUsers.indexOf(state.user.id);
  if(i===-1) a.doneUsers.push(state.user.id); else a.doneUsers.splice(i,1);
  delete a.done; delete a.doneBy;
  await saveSchedule();
  render();
}

function openEditActivity(dayIdx, actIdx){
  const isNew = actIdx===null;
  const a = isNew ? {time:'',title:'',desc:'',roles:{consultor:'',coordAssist:'',coordenador:'',casalDiretor:''},info:{pagManual:'',pagManualJovem:'',quemParticipa:''},doneUsers:[]} : state.schedule.days[dayIdx].activities[actIdx];
  const info = a.info || {pagManual:'',pagManualJovem:'',quemParticipa:''};
  const body = el('div');
  body.innerHTML = `
    <div class="field"><label>Horário</label><input autocomplete="off" id="eTime" value="${esc(a.time)}" placeholder="Ex: 9h–10h"></div>
    <div class="field"><label>Atividade</label><input autocomplete="off" id="eTitle" value="${esc(a.title)}" placeholder="Nome da atividade"></div>
    <div class="field"><label>Designações (bloco principal)</label><textarea autocomplete="off" id="eDesc" placeholder="Ex: pontos-chave que o consultor deve cobrir, materiais necessários, tempo sugerido...">${esc(a.desc||'')}</textarea></div>
    <div class="field"><label>Pág. do Manual</label><input autocomplete="off" id="eInfo1" value="${esc(info.pagManual||'')}" placeholder="Ex: pág. 12"></div>
    <div class="field"><label>Pág. Manual Jovem</label><input autocomplete="off" id="eInfo2" value="${esc(info.pagManualJovem||'')}" placeholder="Ex: pág. 8"></div>
    <div class="field"><label>Quem participa</label><input autocomplete="off" id="eInfo3" value="${esc(info.quemParticipa||'')}" placeholder="Ex: Todos / Consultores"></div>
  `;
  const btnRow = el('div'); btnRow.style.display='flex'; btnRow.style.gap='8px'; btnRow.style.marginTop='6px';
  const save = el('button','btn btn-gold','Salvar'); save.style.flex='1';
  btnRow.appendChild(save);
  if(!isNew){
    const del = el('button','btn btn-danger','Excluir');
    del.onclick = async ()=>{
      state.schedule.days[dayIdx].activities.splice(actIdx,1);
      await saveSchedule(); closeSheet(); render(); toast('Atividade removida');
    };
    btnRow.appendChild(del);
  }
  body.appendChild(btnRow);
  openSheet(isNew?'Nova atividade':'Editar atividade', body, true);

  save.onclick = async ()=>{
    const newA = {
      time:$('#eTime').value.trim(), title:$('#eTitle').value.trim(), desc:$('#eDesc').value.trim(),
      roles:a.roles||{consultor:'',coordAssist:'',coordenador:'',casalDiretor:''},
      info:{pagManual:$('#eInfo1').value.trim(),pagManualJovem:$('#eInfo2').value.trim(),quemParticipa:$('#eInfo3').value.trim()},
      doneUsers:a.doneUsers||[]
    };
    if(!newA.title){ toast('Digite o nome da atividade'); return; }
    if(isNew) state.schedule.days[dayIdx].activities.push(newA);
    else state.schedule.days[dayIdx].activities[actIdx] = newA;
    await saveSchedule(); closeSheet(); render(); toast('Atividade salva');
  };
}

/* ---------------- Necessidades (helpdesk) ---------------- */
const STATUS_LABEL = {aberto:'Aberto', andamento:'Em andamento', concluido:'Concluído'};
const PRIO_LABEL = {baixa:'Baixa',media:'Média',alta:'Alta',urgente:'Urgente'};

function renderNecessidades(){
  const wrap = el('div');
  wrap.appendChild(el('div','section-title','Necessidades e relatos'));

  // Filtro por status
  const filters = el('div','filter-row');
  ['todos','aberto','andamento','concluido'].forEach(f=>{
    const c = el('div','fchip'+(state.needFilter===f?' active':''), f==='todos'?'Todos':STATUS_LABEL[f]);
    c.onclick = ()=>{ state.needFilter=f; render(); };
    filters.appendChild(c);
  });
  wrap.appendChild(filters);

  // Filtro por categoria (permite isolar só os "Relato do Dia", por exemplo)
  const catFilters = el('div','filter-row');
  ['todos', ...NEED_CATEGORIES].forEach(f=>{
    const label = f==='todos' ? 'Todas categorias' : f;
    const c = el('div','fchip'+(state.needCatFilter===f?' active':''), label);
    c.onclick = ()=>{ state.needCatFilter=f; render(); };
    catFilters.appendChild(c);
  });
  wrap.appendChild(catFilters);

  let list = state.needs.slice().filter(canSeeNeed).sort((a,b)=> b.createdAt - a.createdAt);
  if(state.needFilter!=='todos') list = list.filter(n=>n.status===state.needFilter);
  if(state.needCatFilter!=='todos') list = list.filter(n=>n.category===state.needCatFilter);

  if(list.length===0){
    const e = el('div','empty');
    e.innerHTML = `<div class="ic">📋</div><div class="t">Nada por aqui</div><div class="s">Toque no botão + para registrar um pedido, problema, material necessário ou um relato do dia.</div>`;
    wrap.appendChild(e);
    return wrap;
  }

  list.forEach(n=>{
    const card = el('div','card need-card');
    card.innerHTML = `
      <div class="need-top">
        <div class="need-title">${esc(n.title)}</div>
        <span class="tag tag-${n.status}">${STATUS_LABEL[n.status]}</span>
      </div>
      <div class="need-desc">${esc(n.desc)}</div>
      <div class="need-meta">
        <span class="${n.priority==='urgente'?'prio-urgente':n.priority==='alta'?'prio-alta':''}">● ${PRIO_LABEL[n.priority]}</span>
        <span>${esc(n.category)}</span>
        <span>Para: ${esc(n.assignedTo||'—')}</span>
        <span>${esc(n.createdByName)}</span>
        ${n.claimedByName ? `<span>Responsável: ${esc(n.claimedByName)}</span>` : ''}
      </div>
    `;
    card.onclick = ()=> openNeedDetail(n.id);
    wrap.appendChild(card);
  });
  return wrap;
}

function openNewNeed(){
  const body = el('div');
  body.innerHTML = `
    <div class="field"><label>Título</label><input autocomplete="off" id="nTitle" placeholder="Ex: Solicitação de Material"></div>
    <div class="field"><label>Descrição</label><textarea autocomplete="off" id="nDesc" placeholder="Descreva o que está precisando ou o problema enfrentado"></textarea></div>
    <div class="field"><label>Categoria</label>
      <div class="seg" id="nCat">
        ${NEED_CATEGORIES.map((c,i)=>`<div class="seg-opt${i===0?' active':''}" data-v="${c}">${c}</div>`).join('')}
      </div>
    </div>
    <div class="field"><label>Encaminhar para</label>
      <div class="seg" id="nAssign">
        ${ASSIGN_TARGETS.map((a,i)=>`<div class="seg-opt${i===0?' active':''}" data-v="${a}">${a}</div>`).join('')}
      </div>
    </div>
    <div class="field" id="prioField"><label>Prioridade</label>
      <div class="seg" id="nPrio">
        ${['baixa','media','alta','urgente'].map((c,i)=>`<div class="seg-opt${i===0?' active':''}" data-v="${c}">${PRIO_LABEL[c]}</div>`).join('')}
      </div>
    </div>
  `;
  body.querySelectorAll('#nCat .seg-opt').forEach(o=> o.onclick=()=>{
    body.querySelectorAll('#nCat .seg-opt').forEach(x=>x.classList.remove('active'));
    o.classList.add('active');
    // Se for "Relato do Dia", ajusta o texto do campo e esconde a prioridade (não faz sentido para um relato).
    const isRelato = o.dataset.v === 'Relato do Dia';
    $('#nDesc').placeholder = isRelato
      ? 'Conte como foi o dia: desafios, dificuldades com os jovens, sugestões para melhorar amanhã...'
      : 'Descreva o que está precisando ou o problema enfrentado';
    $('#prioField').style.display = isRelato ? 'none' : 'block';
  });
  body.querySelectorAll('#nAssign .seg-opt').forEach(o=> o.onclick=()=>{ body.querySelectorAll('#nAssign .seg-opt').forEach(x=>x.classList.remove('active')); o.classList.add('active'); });
  body.querySelectorAll('#nPrio .seg-opt').forEach(o=> o.onclick=()=>{ body.querySelectorAll('#nPrio .seg-opt').forEach(x=>x.classList.remove('active')); o.classList.add('active'); });

  const save = el('button','btn btn-gold btn-block','Registrar');
  save.style.marginTop = '6px';
  body.appendChild(save);
  openSheet('Nova necessidade / relato', body, true);

  save.onclick = async ()=>{
    const title = $('#nTitle').value.trim();
    if(!title){ toast('Digite um título'); return; }
    const cat = body.querySelector('#nCat .seg-opt.active').dataset.v;
    const assignedTo = body.querySelector('#nAssign .seg-opt.active').dataset.v;
    const prio = body.querySelector('#nPrio .seg-opt.active').dataset.v;
    state.needs.push({
      id:uid(), title, desc:$('#nDesc').value.trim(), category:cat, priority:prio,
      status:'aberto', createdBy:state.user.id, createdByName:state.user.name,
      assignedTo, createdAt:Date.now(), updatedAt:Date.now(),
      claimedBy:null, claimedByName:null
    });
    await saveNeeds(); closeSheet(); render(); toast('Registrado com sucesso');
  };
}

function openNeedDetail(id){
  const n = state.needs.find(x=>x.id===id);
  if(!n) return;
  const body = el('div');
  body.innerHTML = `
    <div class="need-desc" style="margin-bottom:14px;">${esc(n.desc)||'<i>Sem descrição</i>'}</div>
    <div class="need-meta" style="margin-bottom:18px;">
      <span class="${n.priority==='urgente'?'prio-urgente':n.priority==='alta'?'prio-alta':''}">● ${PRIO_LABEL[n.priority]}</span>
      <span>${esc(n.category)}</span>
      <span>Para: ${esc(n.assignedTo||'—')}</span>
      <span>Por ${esc(n.createdByName)}</span>
      <span>${new Date(n.createdAt).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>
    </div>
  `;
  // Combinado: qualquer pessoa da equipe (menos Consultor) pode assumir
  // qualquer chamado, não só os encaminhados pra Logística.
  if(myAccessRank() >= 2){
    const claimWrap = el('div'); claimWrap.style.marginBottom = '16px';
    if(n.claimedBy){
      const info = el('div','helptext', `Responsável: <b>${esc(n.claimedByName)}</b>`);
      claimWrap.appendChild(info);
      if(n.claimedBy===state.user.id){
        const release = el('button','btn btn-outline btn-block','Deixar de ser responsável');
        release.style.marginTop='8px';
        release.onclick = async ()=>{
          n.claimedBy=null; n.claimedByName=null; n.updatedAt=Date.now();
          await saveNeeds(); closeSheet(); render(); toast('Você não é mais o responsável');
        };
        claimWrap.appendChild(release);
      } else {
        const takeover = el('button','btn btn-outline btn-block','Assumir mesmo assim');
        takeover.style.marginTop='8px';
        takeover.onclick = async ()=>{
          n.claimedBy=state.user.id; n.claimedByName=state.user.name; n.updatedAt=Date.now();
          await saveNeeds(); closeSheet(); render(); toast('Você assumiu este chamado');
        };
        claimWrap.appendChild(takeover);
      }
    } else {
      const claim = el('button','btn btn-gold btn-block','Assumir chamado');
      claim.onclick = async ()=>{
        n.claimedBy=state.user.id; n.claimedByName=state.user.name; n.updatedAt=Date.now();
        await saveNeeds(); closeSheet(); render(); toast('Você assumiu este chamado');
      };
      claimWrap.appendChild(claim);
    }
    body.appendChild(claimWrap);
  }
  if(canManageNeed(n)){
    const lbl = el('div','section-title','Atualizar status');
    body.appendChild(lbl);
    const seg = el('div','seg'); seg.id='statusSeg';
    ['aberto','andamento','concluido'].forEach(s=>{
      const o = el('div','seg-opt'+(n.status===s?' active':''), STATUS_LABEL[s]);
      o.dataset.v = s;
      o.onclick = async ()=>{
        n.status = s; n.updatedAt = Date.now();
        await saveNeeds();
        seg.querySelectorAll('.seg-opt').forEach(x=>x.classList.remove('active'));
        o.classList.add('active');
        render(); toast('Status atualizado');
      };
      seg.appendChild(o);
    });
    body.appendChild(seg);

    const del = el('button','btn btn-danger btn-block','Excluir necessidade');
    del.style.marginTop='16px';
    del.onclick = async ()=>{
      state.needs = state.needs.filter(x=>x.id!==id);
      await saveNeeds(); closeSheet(); render(); toast('Excluído');
    };
    body.appendChild(del);
  } else if(n.createdBy===state.user.id){
    const hint = el('div','helptext', n.assignedTo==='Logística'
      ? 'Este chamado foi encaminhado para a Logística. Apenas a equipe de logística (ou o administrador) pode alterar o status. Você pode acompanhar o andamento por aqui.'
      : 'Apenas coordenação pode alterar o status. Você pode acompanhar o andamento por aqui.');
    body.appendChild(hint);
  }
  openSheet(n.title, body, true);
}

/* ---------------- Equipe (roster + permissões) ---------------- */
function renderEquipe(){
  const wrap = el('div');
  wrap.appendChild(el('div','section-title', isAdmin() ? `Equipe (${state.roster.users.length})` : 'Equipe'));

  if(isAdmin()){
    const addBtn = el('button','btn btn-outline btn-block','+ Adicionar membro da equipe');
    addBtn.style.marginBottom='12px';
    addBtn.onclick = openAddMember;
    wrap.appendChild(addBtn);
  }

  const card = el('div','card');
  state.roster.users.slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach(u=>{
    const row = el('div','roster-row');
    row.innerHTML = `
      <div><div class="roster-name">${esc(u.name)}${u.id===state.user.id?' (você)':''}</div><div class="roster-role">${esc(u.manualRole)}</div></div>
      <span class="lvl-pill lvl-${u.access}">${ACCESS[u.access].label}</span>
    `;
    if(isAdmin() && u.id!==state.user.id){
      row.style.cursor='pointer';
      row.onclick = ()=> openEditMember(u.id);
    }
    card.appendChild(row);
  });
  wrap.appendChild(card);

  if(!isAdmin()){
    wrap.appendChild(el('div','helptext','Apenas o administrador pode editar permissões da equipe.'));
  }
  return wrap;
}

function openAddMember(){
  const body = el('div');
  body.innerHTML = `
    <div class="field"><label>Nome</label><input autocomplete="off" id="mName" placeholder="Nome completo"></div>
    <div class="field"><label>Função (manual FSY)</label>
      <div class="seg" id="mRole">${MANUAL_ROLES.map((r,i)=>`<div class="seg-opt${i===0?' active':''}" data-v="${r}">${r}</div>`).join('')}</div>
    </div>
    <div class="field"><label>Nível de acesso no app</label>
      <div class="seg" id="mAccess">
        <div class="seg-opt active" data-v="consultor">Consultor</div>
        <div class="seg-opt" data-v="coordenacao">Coordenação</div>
        <div class="seg-opt" data-v="logistica">Logística</div>
        <div class="seg-opt" data-v="admin">Administrador</div>
      </div>
    </div>
    <div class="field" id="pinField"><label>PIN de acesso (5 dígitos)</label><input autocomplete="one-time-code" id="mPin" type="password" inputmode="numeric" maxlength="5" placeholder="00000"></div>
  `;
  body.querySelectorAll('#mRole .seg-opt').forEach(o=> o.onclick=()=>{ body.querySelectorAll('#mRole .seg-opt').forEach(x=>x.classList.remove('active')); o.classList.add('active'); });
  body.querySelectorAll('#mAccess .seg-opt').forEach(o=> o.onclick=()=>{
    body.querySelectorAll('#mAccess .seg-opt').forEach(x=>x.classList.remove('active')); o.classList.add('active');
  });
  const save = el('button','btn btn-gold btn-block','Adicionar'); save.style.marginTop='6px';
  body.appendChild(save);
  openSheet('Adicionar membro', body, true);

  save.onclick = async ()=>{
    const name = $('#mName').value.trim();
    if(!name){ toast('Digite o nome'); return; }
    const role = body.querySelector('#mRole .seg-opt.active').dataset.v;
    const access = body.querySelector('#mAccess .seg-opt.active').dataset.v;
    const pin = $('#mPin').value.trim();
    if(!/^\d{5}$/.test(pin)){ toast('PIN deve ter 5 dígitos'); return; }
    state.roster.users.push({id:uid(), name, manualRole:role, access, pin});
    await saveRoster(); closeSheet(); render(); toast('Membro adicionado');
  };
}

function openEditMember(id){
  const u = state.roster.users.find(x=>x.id===id);
  if(!u) return;
  const body = el('div');
  body.innerHTML = `
    <div class="field"><label>Nome</label><input autocomplete="off" id="emName" value="${esc(u.name)}"></div>
    <div class="field"><label>Função (manual FSY)</label>
      <div class="seg" id="emRole">${MANUAL_ROLES.map(r=>`<div class="seg-opt${u.manualRole===r?' active':''}" data-v="${r}">${r}</div>`).join('')}</div>
    </div>
    <div class="field"><label>Nível de acesso no app</label>
      <div class="seg" id="emAccess">
        ${['consultor','coordenacao','logistica','admin'].map(a=>`<div class="seg-opt${u.access===a?' active':''}" data-v="${a}">${ACCESS[a].label}</div>`).join('')}
      </div>
    </div>
    <div class="field" id="empinField"><label>PIN de acesso (5 dígitos)</label><input autocomplete="one-time-code" id="emPin" type="password" inputmode="numeric" maxlength="5" value="${esc(u.pin||'')}"></div>
  `;
  body.querySelectorAll('#emRole .seg-opt').forEach(o=> o.onclick=()=>{ body.querySelectorAll('#emRole .seg-opt').forEach(x=>x.classList.remove('active')); o.classList.add('active'); });
  body.querySelectorAll('#emAccess .seg-opt').forEach(o=> o.onclick=()=>{
    body.querySelectorAll('#emAccess .seg-opt').forEach(x=>x.classList.remove('active')); o.classList.add('active');
  });
  const btnRow = el('div'); btnRow.style.display='flex'; btnRow.style.gap='8px'; btnRow.style.marginTop='6px';
  const save = el('button','btn btn-gold','Salvar'); save.style.flex='1';
  const del = el('button','btn btn-danger','Remover');
  btnRow.appendChild(save); btnRow.appendChild(del);
  body.appendChild(btnRow);
  openSheet('Editar membro', body, true);

  save.onclick = async ()=>{
    const access = body.querySelector('#emAccess .seg-opt.active').dataset.v;
    const pin = $('#emPin').value.trim();
    if(!/^\d{5}$/.test(pin)){ toast('PIN deve ter 5 dígitos'); return; }
    u.name = $('#emName').value.trim() || u.name;
    u.manualRole = body.querySelector('#emRole .seg-opt.active').dataset.v;
    u.access = access; u.pin = pin;
    await saveRoster(); closeSheet(); render(); toast('Atualizado');
  };
  del.onclick = async ()=>{
    state.roster.users = state.roster.users.filter(x=>x.id!==id);
    await saveRoster(); closeSheet(); render(); toast('Removido da equipe');
  };
}

/* ---------------- Boot ---------------- */
(async function init(){
  $('#app').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--muted);font-size:13px;">Carregando…</div>';
  await loadAll();
  await tryAutoLogin();
  render();
  startRealtimeSync();
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(console.error);
  });
}
</script>
